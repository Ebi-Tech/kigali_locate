name: kigali_locate
description: "Kigali City Services & Places Directory - A mobile app to help residents locate and navigate to essential public services and lifestyle locations."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Maps & Location (OpenStreetMap — no API key required)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Navigation & URLs
  url_launcher: ^6.3.0

  # Local Storage
  shared_preferences: ^2.3.1

  # UI Helpers
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
